name: Linting y Análisis de Código

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint black isort mypy

    - name: Check code formatting with black
      run: black --check src/ test/
      continue-on-error: true

    - name: Check import order with isort
      run: isort --check-only src/ test/
      continue-on-error: true

    - name: Lint with flake8
      run: |
        flake8 src/ test/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ test/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true

    - name: Type checking with mypy
      run: mypy src/text_analyzer --ignore-missing-imports --no-error-summary
      continue-on-error: true

    - name: Security check with bandit
      run: |
        pip install bandit
        bandit -r src/ --skip B101 -f json -o bandit-report.json
      continue-on-error: true
